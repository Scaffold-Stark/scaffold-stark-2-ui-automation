services:
  starknet-devnet:
    image: shardlabs/starknet-devnet-rs:0.2.4
    pull_policy: missing
    command: --seed 0 --account-class cairo1
    ports:
      - "5050:5050"
    networks:
      - scaffold-stark-network
    hostname: starknet-devnet

  nextjs:
    build:
      context: ../..
      dockerfile: packages/ui-automation/Dockerfile.nextjs
      args:
        - RPC_URL_DEVNET=http://starknet-devnet:5050
        - NEXT_PUBLIC_PROVIDER_URL=http://starknet-devnet:5050
    pull_policy: missing
    depends_on:
      - starknet-devnet
    ports:
      - "3000:3000"
    environment:
      - RPC_URL_DEVNET=http://starknet-devnet:5050
      - NEXT_PUBLIC_PROVIDER_URL=http://starknet-devnet:5050
    networks:
      - scaffold-stark-network
    entrypoint: ["/docker-entrypoint.sh"]
    hostname: nextjs

  playwright:
    image: mcr.microsoft.com/playwright:latest
    pull_policy: always
    deploy:
      replicas: 1
      restart_policy:
        condition: none
    depends_on:
      - nextjs
      - starknet-devnet
    shm_size: "2gb"
    environment:
      - BASE_URL=http://nextjs:3000
    volumes:
      - ../ui-automation:/app
      - ./test-results:/app/test-results
    working_dir: /app
    command: bash -c "npm install && tail -f /dev/null"
    networks:
      - scaffold-stark-network

networks:
  scaffold-stark-network:
    driver: bridge
